name: frontend-deploy

# Reusable frontend deploy. Single source of truth = Terraform/SSM: this job authenticates via OIDC,
# then reads the bucket / CloudFront distribution / API URL / Cognito IDs from SSM at runtime (no
# duplicated GitHub variables), builds the Vite SPA with that config, syncs to S3, invalidates CloudFront.
on:
  workflow_call:
    inputs:
      service-path:
        required: false
        type: string
        default: frontend
      role-to-assume:
        required: true
        type: string
      aws-region:
        required: false
        type: string
        default: us-east-1
      ssm-prefix:
        description: "SSM path prefix holding the deploy config."
        required: false
        type: string
        default: /lablumen/config
      node-version:
        required: false
        type: string
        default: "20"

permissions:
  id-token: write
  contents: read

defaults:
  run:
    working-directory: ${{ inputs.service-path }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Authenticate FIRST so we can read config from SSM (role ARN is the only static input —
      # it must be known pre-auth, so it can't itself come from SSM).
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.role-to-assume }}
          aws-region: ${{ inputs.aws-region }}

      - name: Discover config from SSM
        id: cfg
        run: |
          set -euo pipefail
          P="${{ inputs.ssm-prefix }}"
          get() { aws ssm get-parameter --name "$P/$1" --query Parameter.Value --output text; }
          {
            echo "bucket=$(get frontend-bucket)"
            echo "dist=$(get cloudfront-distribution-id)"
            echo "api=$(get api-url)"
            echo "pool=$(get cognito-user-pool-id)"
            echo "client=$(get cognito-app-client-id)"
          } >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm
          cache-dependency-path: ${{ inputs.service-path }}/package-lock.json

      - run: npm ci

      - name: Build (inject prod config discovered from SSM)
        env:
          VITE_APPOINTMENT_API: ${{ steps.cfg.outputs.api }}
          VITE_REPORT_API: ${{ steps.cfg.outputs.api }}
          VITE_COGNITO_USER_POOL_ID: ${{ steps.cfg.outputs.pool }}
          VITE_COGNITO_APP_CLIENT_ID: ${{ steps.cfg.outputs.client }}
          VITE_COGNITO_DOMAIN: ""   # set once a Cognito hosted-UI domain exists (SRP needs none)
        run: npm run build

      - name: Sync to S3
        run: aws s3 sync dist/ "s3://${{ steps.cfg.outputs.bucket }}/" --delete

      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id "${{ steps.cfg.outputs.dist }}" --paths "/*"
