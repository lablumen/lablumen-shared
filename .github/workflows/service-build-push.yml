name: service-build-push

# Reusable DEV deploy for ONE backend service (polyrepo, trunk-based): on push to main, build the image
# tagged with the 7-char git SHA, run the Trivy gate, push to ECR (OIDC), then write that SHA into
# lablumen-k8s services/<service>/values-dev.yaml. The write-back uses a `git pull --rebase` retry loop
# so concurrent service repos committing to lablumen-k8s don't collide.
on:
  workflow_call:
    inputs:
      service-name:
        description: "Service id, e.g. appointment-service (also the k8s services/<name> folder)."
        required: true
        type: string
      service-path:
        description: "Path to the service source (Dockerfile + app/). Repo root in polyrepo."
        required: false
        type: string
        default: "."
      ecr-repository:
        description: "ECR repo name, e.g. lablumen/appointment-service (registry host derived from ECR login)."
        required: true
        type: string
      role-to-assume:
        description: "IAM role ARN to assume via OIDC (ECR push)."
        required: true
        type: string
      aws-region:
        required: false
        type: string
        default: us-east-1
      k8s-repo:
        description: "GitOps repo holding the values files."
        required: false
        type: string
        default: lablumen/lablumen-k8s
    secrets:
      K8S_REPO_PAT:
        description: "PAT with write access to the k8s repo (for the values-dev.yaml commit)."
        required: true
    outputs:
      image-tag:
        description: "The 7-char git SHA tag that was built and pushed."
        value: ${{ jobs.build.outputs.tag }}

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - id: meta
        run: echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.role-to-assume }}
          aws-region: ${{ inputs.aws-region }}

      - id: login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build
        run: |
          IMAGE="${{ steps.login.outputs.registry }}/${{ inputs.ecr-repository }}"
          docker build -t "$IMAGE:${{ steps.meta.outputs.tag }}" "${{ inputs.service-path }}"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Trivy gate (fail on CRITICAL/HIGH before push)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.IMAGE }}:${{ steps.meta.outputs.tag }}"
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"

      - name: Push
        run: docker push "$IMAGE:${{ steps.meta.outputs.tag }}"

      # ---- GitOps write-back: bump values-dev.yaml in lablumen-k8s (rebase-retry for race safety) ----
      - name: Checkout ${{ inputs.k8s-repo }}
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.k8s-repo }}
          token: ${{ secrets.K8S_REPO_PAT }}
          path: k8s

      - name: Bump dev image tag
        working-directory: k8s
        env:
          TAG: ${{ steps.meta.outputs.tag }}
          SVC: ${{ inputs.service-name }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          f="services/${SVC}/values-dev.yaml"
          yq -i ".image.tag = \"${TAG}\"" "$f"
          if git diff --quiet; then echo "values-dev already at ${TAG}"; exit 0; fi
          git add "$f"
          git commit -m "cd(dev): ${SVC} -> ${TAG}"
          for i in $(seq 1 5); do
            if git pull --rebase origin main && git push origin main; then echo "pushed"; exit 0; fi
            echo "push conflict, retry $i/5"; sleep 5
          done
          echo "::error::failed to push values-dev after retries"; exit 1
