name: service-pr

# Reusable PR gate for ONE backend service: lint + test + SonarCloud (SAST) + Snyk (SCA) +
# Trivy (container scan, never pushed). All hard-fail. Called per changed service by lablumen-app.
on:
  workflow_call:
    inputs:
      service-name:
        description: "Service identifier, e.g. appointment-service (also the Sonar project suffix)."
        required: true
        type: string
      service-path:
        description: "Path to the service source (Dockerfile + app/ + requirements)."
        required: true
        type: string
      sonar-organization:
        description: "SonarCloud organization key."
        required: true
        type: string
      python-version:
        required: false
        type: string
        default: "3.12"
    secrets:
      SONAR_TOKEN:
        required: true
      SNYK_TOKEN:
        required: true

jobs:
  pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # SonarCloud needs full history

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install deps
        run: pip install -r "${{ inputs.service-path }}/requirements-dev.txt"

      - name: Ruff
        run: ruff check "${{ inputs.service-path }}"

      - name: Pytest
        working-directory: ${{ inputs.service-path }}
        run: python -m pytest -q

      - name: SonarCloud (SAST) + quality gate
        uses: SonarSource/sonarqube-scan-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: ${{ inputs.service-path }}
          args: >
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.organization=${{ inputs.sonar-organization }}
            -Dsonar.projectKey=${{ inputs.sonar-organization }}_lablumen-${{ inputs.service-name }}
            -Dsonar.sources=app
            -Dsonar.exclusions=**/tests/**
            -Dsonar.qualitygate.wait=true

      - name: Snyk (SCA)
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          npm install -g snyk
          snyk test --file="${{ inputs.service-path }}/requirements.txt" --severity-threshold=high

      - name: Build image (temporary, never pushed)
        run: docker build -t "scan:${{ inputs.service-name }}" "${{ inputs.service-path }}"

      - name: Trivy container scan (fail on CRITICAL/HIGH)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "scan:${{ inputs.service-name }}"
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
