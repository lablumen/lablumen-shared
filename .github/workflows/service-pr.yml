name: service-pr

# Reusable PR gate for ONE service (Python or Node): lint + test + SonarCloud (SAST) + Snyk (SCA) +
# Trivy (container scan, never pushed). All hard-fail. Called per changed service by the app CI.
on:
  workflow_call:
    inputs:
      service-name:
        description: "Service identifier, e.g. appointment-service (also the Sonar project suffix)."
        required: true
        type: string
      service-path:
        description: "Path to the service source (Dockerfile + source dir + dependency manifest)."
        required: true
        type: string
      runtime:
        description: "Application runtime: 'node' or 'python'. Drives install/lint/test steps."
        required: false
        type: string
        default: python
      sonar-organization:
        description: "SonarCloud organization key."
        required: true
        type: string
      sonar-sources:
        description: "Comma-separated source paths for SonarCloud analysis."
        required: false
        type: string
        default: app
      python-version:
        required: false
        type: string
        default: "3.12"
      node-version:
        required: false
        type: string
        default: "20"
    secrets:
      SONAR_TOKEN:
        required: true
      SNYK_TOKEN:
        required: true

jobs:
  pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # SonarCloud needs full history

      # ---- Python setup ----
      - uses: actions/setup-python@v5
        if: inputs.runtime == 'python'
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install Python deps
        if: inputs.runtime == 'python'
        run: pip install -r "${{ inputs.service-path }}/requirements-dev.txt"

      - name: Ruff
        if: inputs.runtime == 'python'
        run: ruff check "${{ inputs.service-path }}"

      - name: Pytest
        if: inputs.runtime == 'python'
        working-directory: ${{ inputs.service-path }}
        run: python -m pytest -q

      # ---- Node setup ----
      - uses: actions/setup-node@v4
        if: inputs.runtime == 'node'
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm
          cache-dependency-path: ${{ inputs.service-path }}/package-lock.json

      - name: Install Node deps
        if: inputs.runtime == 'node'
        working-directory: ${{ inputs.service-path }}
        run: npm ci

      - name: Build (type-check + catch compilation errors)
        if: inputs.runtime == 'node'
        working-directory: ${{ inputs.service-path }}
        run: npm run build

      # ---- SAST ----
      - name: SonarCloud (SAST) + quality gate
        uses: SonarSource/sonarqube-scan-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: ${{ inputs.service-path }}
          args: >
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.organization=${{ inputs.sonar-organization }}
            -Dsonar.projectKey=${{ inputs.sonar-organization }}_lablumen-${{ inputs.service-name }}
            -Dsonar.sources=${{ inputs.sonar-sources }}
            -Dsonar.exclusions=**/tests/**,**/*.test.*,**/*.spec.*
            -Dsonar.qualitygate.wait=true

      # ---- SCA ----
      - name: Snyk (SCA) — Python
        if: inputs.runtime == 'python'
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          npm install -g snyk
          snyk test --file="${{ inputs.service-path }}/requirements.txt" --severity-threshold=high

      - name: Snyk (SCA) — Node
        if: inputs.runtime == 'node'
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        working-directory: ${{ inputs.service-path }}
        run: |
          npm install -g snyk
          snyk test --severity-threshold=high

      # ---- Container scan ----
      - name: Build image (temporary, never pushed)
        run: docker build -t "scan:${{ inputs.service-name }}" "${{ inputs.service-path }}"

      - name: Trivy container scan (fail on CRITICAL/HIGH)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "scan:${{ inputs.service-name }}"
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
